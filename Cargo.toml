[workspace]
members  = [ "eh", "xtask" ]
resolver = "3"

[workspace.package]
authors      = [ "NotAShelf <raf@notashelf.dev>" ]
description  = "Ergonomic Nix CLI helper"
edition      = "2024"
license      = "MPL-2.0"
readme       = true
rust-version = "1.85"
version      = "0.1.1"

[workspace.dependencies]
clap               = { default-features = false, features = [ "std", "help", "derive" ], version = "4.5" }
regex              = "1.11"
tracing            = "0.1"
tracing-subscriber = "0.3"
yansi              = "1.0"

[profile.release]
codegen-units = 1
lto           = true
opt-level     = "z"
panic         = "abort"
strip         = true
