[workspace]
default-members = [ "eh" ]
members         = [ "eh", "crates/*" ]
resolver        = "3"

[workspace.package]
authors      = [ "NotAShelf <raf@notashelf.dev>" ]
description  = "Ergonomic Nix CLI helper"
edition      = "2024"
license      = "MPL-2.0"
readme       = true
rust-version = "1.90"
version      = "0.1.4"

[workspace.dependencies]
clap          = { default-features = false, features = [ "std", "help", "derive" ], version = "4.5.56" }
clap_complete = "4.5.65"
dialoguer     = { default-features = false, version = "0.12.0" }
regex         = "1.12.2"
serde_json    = "1.0.149"
tempfile      = "3.24.0"
thiserror     = "2.0.18"
walkdir       = "2.5.0"
yansi         = "1.0.1"

eh     = { path = "./eh" }
eh-log = { path = "./crates/eh-log" }

[profile.release]
codegen-units = 1
lto           = true
opt-level     = "z"
panic         = "abort"
strip         = true
