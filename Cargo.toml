[workspace]
members  = [ "eh", "crates/*" ]
default-members = ["eh"]
resolver = "3"

[workspace.package]
authors      = [ "NotAShelf <raf@notashelf.dev>" ]
description  = "Ergonomic Nix CLI helper"
edition      = "2024"
license      = "MPL-2.0"
readme       = true
rust-version = "1.89"
version      = "0.1.3"

[workspace.dependencies]
clap               = { default-features = false, features = [ "std", "help", "derive" ], version = "4.5.51" }
clap_complete      = "4.5.60"
regex              = "1.12.2"
tempfile           = "3.23.0"
thiserror          = "2.0.17"
walkdir            = "2.5.0"
yansi              = "1.0.1"

eh = { path = "./eh" }

[profile.release]
codegen-units = 1
lto           = true
opt-level     = "z"
panic         = "abort"
strip         = true
