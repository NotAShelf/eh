[workspace]
members = ["eh", "xtask"]
resolver = "3"

[workspace.package]
authors      = [ "NotAShelf <raf@notashelf.dev>"]
description  = "Ergonomic Nix CLI helper"
edition      = "2024"
license      = "MPL-2.0"
readme       = true
rust-version = "1.85"
version      = "0.1.0"

[workspace.dependencies]
clap = { version = "4.5", features = ["derive"] }
regex = "1.0"
